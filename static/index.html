<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header svg { color: #ff4444; flex-shrink: 0; }
    header h1 { font-size: 17px; font-weight: 600; color: #fff; }
    header span { font-size: 13px; color: #666; margin-left: 4px; }

    .load-bar {
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      padding: 10px 24px;
      display: flex;
      gap: 8px;
    }
    .load-bar input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 9px 13px;
      color: #e8e8e8;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .load-bar input::placeholder { color: #555; }
    .load-bar input:focus { border-color: #ff4444; }
    .load-bar button {
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
    }
    .load-bar button:hover:not(:disabled) { background: #e03030; }
    .load-bar button:disabled { opacity: 0.45; cursor: not-allowed; }

    .status-bar {
      padding: 7px 24px;
      font-size: 12px;
      background: #0a0a0a;
      border-bottom: 1px solid #1e1e1e;
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #666;
    }
    .status-bar.ok   { color: #4caf50; }
    .status-bar.err  { color: #f44336; }
    .status-bar.spin { color: #aaa; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .spinner {
      width: 12px; height: 12px; flex-shrink: 0;
      border: 2px solid #555; border-top-color: #aaa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat::-webkit-scrollbar { width: 5px; }
    .chat::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #3a3a3a;
      gap: 10px;
      pointer-events: none;
    }
    .empty p { font-size: 14px; }

    .msg { display: flex; flex-direction: column; max-width: 72%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble { background: #ff4444; color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot  .bubble { background: #1e1e1e; color: #e0e0e0; border-bottom-left-radius: 4px; }
    .msg.bot.thinking .bubble { color: #666; }

    .thinking-dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

    .input-bar {
      background: #111;
      border-top: 1px solid #2a2a2a;
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .input-bar textarea {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 13px;
      color: #e8e8e8;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      height: 44px;
      max-height: 120px;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.15s;
      overflow-y: auto;
    }
    .input-bar textarea::placeholder { color: #555; }
    .input-bar textarea:focus { border-color: #ff4444; }
    .input-bar textarea:disabled { opacity: 0.4; cursor: not-allowed; }
    .input-bar button {
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      height: 44px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }
    .input-bar button:hover:not(:disabled) { background: #e03030; }
    .input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
    <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.3 6.3 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.77a4.85 4.85 0 0 1-1.01-.08z"/>
  </svg>
  <h1>YouTube Chat</h1>
  <span>Ask questions about any video transcript</span>
</header>

<div class="load-bar">
  <input id="videoInput" type="text" placeholder="YouTube URL or video ID  (e.g. https://youtu.be/Gfr50f6ZBvo)" />
  <button id="loadBtn" onclick="loadVideo()">Load Video</button>
</div>

<div class="status-bar" id="statusBar">
  <div class="dot"></div>
  <span>Enter a YouTube URL or video ID above to get started.</span>
</div>

<div class="chat" id="chat">
  <div class="empty" id="emptyState">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <p>Load a video, then ask anything about it</p>
  </div>
</div>

<div class="input-bar">
  <textarea id="questionInput" placeholder="Ask a question about the video…" disabled
    onkeydown="handleKey(event)"
    oninput="autoResize(this)"></textarea>
  <button id="sendBtn" onclick="sendQuestion()" disabled>Send</button>
</div>

<script>
  let videoLoaded = false;

  // ── helpers ──────────────────────────────────────────────────────────────

  function setStatus(type, text) {
    const bar = document.getElementById('statusBar');
    bar.className = 'status-bar ' + type;
    if (type === 'spin') {
      bar.innerHTML = `<div class="spinner"></div><span>${text}</span>`;
    } else {
      bar.innerHTML = `<div class="dot"></div><span>${text}</span>`;
    }
  }

  function addMessage(role, html, classes = '') {
    const chat = document.getElementById('chat');
    const wrap = document.createElement('div');
    wrap.className = `msg ${role} ${classes}`;
    wrap.innerHTML = `<div class="bubble">${html}</div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function autoResize(el) {
    el.style.height = '44px';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
  }

  // ── load video ───────────────────────────────────────────────────────────

  async function loadVideo() {
    const input = document.getElementById('videoInput').value.trim();
    if (!input) return;

    setStatus('spin', 'Fetching transcript and building index — this may take 15–30 s…');
    document.getElementById('loadBtn').disabled = true;

    try {
      const res  = await fetch('/load', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ video_id: input }),
      });
      let data;
      try { data = await res.json(); } catch { data = { detail: `Server error ${res.status}` }; }

      if (!res.ok) {
        setStatus('err', data.detail || 'Failed to load video.');
      } else {
        videoLoaded = true;
        setStatus('ok', `Loaded "${data.video_id}" — ${data.chunks} chunks indexed. Ready to chat!`);
        document.getElementById('emptyState').remove();
        document.getElementById('questionInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('questionInput').focus();
      }
    } catch (e) {
      setStatus('err', 'Could not reach server: ' + e.message);
    }

    document.getElementById('loadBtn').disabled = false;
  }

  // ── ask question ─────────────────────────────────────────────────────────

  async function sendQuestion() {
    const ta = document.getElementById('questionInput');
    const question = ta.value.trim();
    if (!question || !videoLoaded) return;

    addMessage('user', esc(question));
    ta.value = '';
    autoResize(ta);
    document.getElementById('sendBtn').disabled = true;

    const thinking = addMessage('bot', '<span class="thinking-dots"><span>●</span><span>●</span><span>●</span></span>', 'thinking');

    try {
      const res  = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });
      const data = await res.json();
      thinking.remove();

      addMessage('bot', res.ok ? esc(data.answer) : 'Error: ' + esc(data.detail || 'Something went wrong.'));
    } catch (e) {
      thinking.remove();
      addMessage('bot', 'Could not reach server: ' + esc(e.message));
    }

    document.getElementById('sendBtn').disabled = false;
    ta.focus();
  }

  // ── restore state on refresh ─────────────────────────────────────────────

  fetch('/status').then(r => r.json()).then(data => {
    if (data.loaded) {
      videoLoaded = true;
      document.getElementById('videoInput').value = data.video_id;
      setStatus('ok', `Video "${data.video_id}" already loaded. Ready to chat!`);
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();
      document.getElementById('questionInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
    }
  }).catch(() => {});
</script>
</body>
</html>
